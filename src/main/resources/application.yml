spring:
  application:
    name: rag-doc-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ragdoc}
    username: ${DB_USERNAME:ragdoc}
    password: ${DB_PASSWORD:ragdoc}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        options:
          model: nomic-embed-text
      chat:
        options:
          model: llama3.2:3b

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
