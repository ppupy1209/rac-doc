spring:
  application:
    name: ask-wiki
  servlet:
    multipart:
      max-file-size: 20MB      # PDF 업로드 대비 (기본 1MB)
      max-request-size: 20MB
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ragdoc}
    username: ${DB_USERNAME:ragdoc}
    password: ${DB_PASSWORD:ragdoc}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}
  ai:
    model:
      embedding: ollama
      # OpenAI 스타터는 Gemini 챗(OpenAI 호환)에만 쓴다. 안 쓰는 OpenAI 모델 타입(이미지·오디오·모더레이션)은
      # 빈 api-key로도 컨텍스트가 부팅되도록 비활성화한다. chat은 LlmProviderEnvironmentPostProcessor가 동적 설정.
      image: none
      audio:
        speech: none
        transcription: none
      moderation: none
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        options:
          model: nomic-embed-text
      chat:
        options:
          model: llama3.2:3b
    # This OpenAI starter is used only for Gemini's OpenAI-compatible endpoint.
    # Split it into a separate provider configuration before adding real GPT/OpenAI support.
    openai:
      api-key: ${GOOGLE_GENAI_API_KEY:}
      base-url: https://generativelanguage.googleapis.com
      chat:
        completions-path: /v1beta/openai/chat/completions
        options:
          # C2-5 확정 (2026-07-12): 무료 티어 계정 실측 — 2.5-flash·3.5-flash는 RPD 20이라 50문항 평가 불가,
          # 3.1-flash-lite만 RPM 15·RPD 500으로 완주 가능. 품질 실측 환각 0%·오거부 6.7% (design-notes §4).
          model: gemini-3.1-flash-lite
          # thinking 끄기 — RAG엔 사고 불필요. 2.5-flash 스모크 12s→1s·사고 토큰 0, 3.1-flash-lite 실측 mean 637ms.
          reasoning-effort: none

askwiki:
  es:
    url: ${ES_URL:http://localhost:9200}
  llm:
    provider: ${ASKWIKI_LLM_PROVIDER:ollama}
    # 장애격리 (C2-4): 동시 호출 상한(세마포어)·호출 타임아웃·세마포어 획득 대기.
    max-concurrent: ${ASKWIKI_LLM_MAX_CONCURRENT:8}          # 동시 LLM 호출 상한 (초과 시 degraded)
    call-timeout-ms: ${ASKWIKI_LLM_CALL_TIMEOUT_MS:20000}    # 호출 타임아웃 (초과 시 degraded)
    acquire-timeout-ms: ${ASKWIKI_LLM_ACQUIRE_TIMEOUT_MS:2000}  # 세마포어 획득 대기

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ask-wiki
    distribution:
      percentiles-histogram:
        http.server.requests: true   # p99 등 히스토그램 지표(_bucket) 생성 → Grafana에서 백분위 계산
        llm.latency: true            # LLM 호출 지연 p95/p99 (C2-3, 프로바이더별 비교)
