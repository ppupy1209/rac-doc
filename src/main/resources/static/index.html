<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ask Wiki — 사내 문서 Q&A</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --border: #e7e9ee;
    --border-strong: #d8dbe2;
    --text: #191c22;
    --muted: #71788a;
    --accent: #4655e5;
    --accent-hover: #3846cf;
    --accent-soft: #eef0fd;
    --danger: #d92d20;
    --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.05);
    --shadow-md: 0 4px 16px rgba(16, 24, 40, 0.08);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
      "Apple SD Gothic Neo", "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ── 헤더 ─────────────────────────────── */
  header {
    height: 56px; flex-shrink: 0;
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .mark {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #7c4ce5);
    display: grid; place-items: center; color: #fff;
  }
  .brand h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .brand .tag { font-size: 12px; color: var(--muted); margin-left: 2px; }
  .status { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
  .status .dot { width: 7px; height: 7px; border-radius: 50%; background: #c2c7d1; }
  .status.up .dot { background: #12b76a; box-shadow: 0 0 0 3px rgba(18, 183, 106, 0.15); }
  .status.down .dot { background: var(--danger); }

  main { flex: 1; display: flex; min-height: 0; }

  /* ── 사이드바: 지식 베이스 ─────────────── */
  aside {
    width: 320px; flex-shrink: 0;
    border-right: 1px solid var(--border); background: var(--surface);
    padding: 20px 16px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 18px;
  }
  aside h2 {
    font-size: 11.5px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .dropzone {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 22px 14px; margin-top: 10px;
    border: 1.5px dashed var(--border-strong); border-radius: var(--radius);
    color: var(--muted); text-align: center; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .dropzone:hover, .dropzone.drag { border-color: var(--accent); background: var(--accent-soft); }
  .dropzone svg { color: var(--accent); }
  .dropzone strong { font-size: 13px; color: var(--text); font-weight: 600; }
  .dropzone span { font-size: 12px; }
  .dropzone.busy { pointer-events: none; opacity: 0.6; }

  details.paste { margin-top: 10px; }
  details.paste summary {
    font-size: 12.5px; color: var(--muted); cursor: pointer; user-select: none;
  }
  details.paste summary:hover { color: var(--text); }
  details.paste form { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  details.paste input, details.paste textarea {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; font-size: 13px; font-family: inherit; background: var(--bg);
  }
  details.paste input:focus, details.paste textarea:focus {
    outline: none; border-color: var(--accent); background: var(--surface);
  }
  details.paste textarea { min-height: 96px; resize: vertical; }

  .doc-head { display: flex; align-items: baseline; gap: 8px; }
  .doc-head .count { font-size: 11.5px; color: var(--muted); }
  ul.doc-list { list-style: none; padding: 0; margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
  .doc-item {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 10px; border-radius: 8px; font-size: 13.5px;
    transition: background 0.12s;
  }
  .doc-item:hover { background: var(--bg); }
  .doc-item svg { flex-shrink: 0; color: var(--muted); }
  .doc-item .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .doc-item .chunks {
    font-size: 11px; color: var(--muted); background: var(--bg);
    border: 1px solid var(--border); border-radius: 20px; padding: 1px 8px; white-space: nowrap;
  }
  .doc-item:hover .chunks { display: none; }
  .doc-item .del {
    display: none; border: none; background: none; cursor: pointer;
    color: var(--muted); padding: 2px; border-radius: 6px; line-height: 0;
  }
  .doc-item:hover .del { display: block; }
  .doc-item .del:hover { color: var(--danger); background: #fef3f2; }
  .doc-empty { font-size: 12.5px; color: var(--muted); padding: 8px 2px; }

  /* ── 채팅 ─────────────────────────────── */
  .chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .thread {
    flex: 1; overflow-y: auto; padding: 28px 24px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .thread-inner { width: 100%; max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }

  .empty {
    margin: auto; text-align: center; color: var(--muted); padding: 40px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .empty .glyph {
    width: 52px; height: 52px; border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), #7c4ce5);
    display: grid; place-items: center; color: #fff; box-shadow: var(--shadow-md);
  }
  .empty h3 { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
  .empty p { font-size: 13.5px; line-height: 1.7; }

  .msg { display: flex; gap: 10px; animation: rise 0.25s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .msg.q { justify-content: flex-end; }
  .msg.q .bubble {
    background: var(--accent); color: #fff;
    border-radius: 16px 16px 4px 16px; max-width: 78%;
  }
  .msg.a .avatar {
    width: 30px; height: 30px; border-radius: 10px; flex-shrink: 0; margin-top: 2px;
    background: linear-gradient(135deg, var(--accent), #7c4ce5);
    display: grid; place-items: center; color: #fff;
  }
  .msg.a .bubble {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px; box-shadow: var(--shadow-sm); max-width: 82%;
  }
  .bubble { padding: 12px 15px; font-size: 14.5px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
  .msg.a.error .bubble { border-color: #fda29b; background: #fffbfa; }

  .sources { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
  .sources .label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 7px; }
  .sources .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--accent); background: var(--accent-soft);
    border-radius: 20px; padding: 3px 10px; white-space: nowrap;
  }
  .meta { margin-top: 9px; display: flex; gap: 8px; align-items: center; font-size: 11.5px; color: var(--muted); }
  .meta .cached {
    color: #067647; background: #ecfdf3; border-radius: 20px; padding: 1px 8px; font-weight: 500;
  }

  .typing { display: inline-flex; gap: 4px; padding: 4px 0; }
  .typing i {
    width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
    animation: blink 1.2s infinite;
  }
  .typing i:nth-child(2) { animation-delay: 0.15s; }
  .typing i:nth-child(3) { animation-delay: 0.3s; }
  @keyframes blink { 0%, 70%, 100% { opacity: 0.25; } 35% { opacity: 1; } }

  /* ── 입력창 ───────────────────────────── */
  .composer-wrap { flex-shrink: 0; padding: 14px 24px 18px; background: linear-gradient(transparent, var(--bg) 40%); }
  .composer {
    max-width: 760px; margin: 0 auto;
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 6px 6px 6px 16px; box-shadow: var(--shadow-md);
    transition: border-color 0.15s;
  }
  .composer:focus-within { border-color: var(--accent); }
  .composer input {
    flex: 1; border: none; outline: none; font-size: 14.5px; font-family: inherit;
    background: none; color: var(--text); padding: 8px 0;
  }
  .composer input::placeholder { color: var(--muted); }
  .composer button {
    width: 38px; height: 38px; border: none; border-radius: 10px; flex-shrink: 0;
    background: var(--accent); color: #fff; cursor: pointer;
    display: grid; place-items: center; transition: background 0.15s;
  }
  .composer button:hover { background: var(--accent-hover); }
  .composer button:disabled { background: var(--border-strong); cursor: default; }
  .composer-hint { max-width: 760px; margin: 8px auto 0; font-size: 11.5px; color: var(--muted); text-align: center; }

  /* ── 토스트 ───────────────────────────── */
  #toasts { position: fixed; top: 68px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 50; }
  .toast {
    background: #101828; color: #fff; font-size: 13px;
    border-radius: 10px; padding: 10px 14px; box-shadow: var(--shadow-md);
    animation: rise 0.2s ease both; max-width: 320px;
  }
  .toast.err { background: var(--danger); }

  @media (max-width: 800px) {
    main { flex-direction: column; }
    aside { width: 100%; max-height: 38vh; border-right: none; border-bottom: 1px solid var(--border); }
    .msg.q .bubble, .msg.a .bubble { max-width: 92%; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="mark" aria-hidden>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </span>
    <h1>Ask Wiki</h1>
    <span class="tag">사내 문서 Q&A</span>
  </div>
  <div id="status" class="status"><span class="dot"></span><span id="status-text">확인 중…</span></div>
</header>

<main>
  <aside>
    <section>
      <h2>지식 베이스</h2>
      <label id="dropzone" class="dropzone">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <strong id="drop-title">파일을 끌어다 놓거나 클릭</strong>
        <span>md · txt · pdf, 최대 20MB</span>
        <input id="file-input" type="file" accept=".md,.txt,.pdf" hidden />
      </label>
      <details class="paste">
        <summary>텍스트로 직접 등록</summary>
        <form id="paste-form">
          <input id="paste-title" placeholder="제목" required />
          <textarea id="paste-content" placeholder="문서 내용" required></textarea>
          <button class="chip" style="border:none;cursor:pointer;justify-content:center" type="submit">등록</button>
        </form>
      </details>
    </section>
    <section>
      <div class="doc-head"><h2>등록된 문서</h2><span id="doc-count" class="count"></span></div>
      <ul id="doc-list" class="doc-list"></ul>
    </section>
  </aside>

  <section class="chat">
    <div id="thread" class="thread">
      <div class="thread-inner" id="thread-inner">
        <div class="empty" id="empty-state">
          <span class="glyph" aria-hidden>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </span>
          <h3>무엇이든 물어보세요</h3>
          <p>등록된 문서를 근거로, 출처와 함께 답합니다.<br />문서에 없는 내용은 지어내지 않고 모른다고 답합니다.</p>
        </div>
      </div>
    </div>
    <div class="composer-wrap">
      <form id="ask-form" class="composer">
        <input id="question" placeholder="등록된 문서에 대해 질문해 보세요" autocomplete="off" required />
        <button id="ask-btn" type="submit" aria-label="질문 보내기">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>
      <p class="composer-hint">같은 질문은 캐시에서 즉시 답합니다 · 응답에 출처와 소요 시간이 표시됩니다</p>
    </div>
  </section>
</main>

<div id="toasts"></div>

<script>
  const $ = (id) => document.getElementById(id);
  const threadEl = $("thread");
  const innerEl = $("thread-inner");
  const docListEl = $("doc-list");

  const DOC_ICON = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
  const TRASH_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
  const AVATAR = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';

  function toast(message, isError = false) {
    const el = document.createElement("div");
    el.className = "toast" + (isError ? " err" : "");
    el.textContent = message;
    $("toasts").appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  async function readError(res) {
    try { return (await res.json()).message || `요청 실패 (${res.status})`; }
    catch { return `요청 실패 (${res.status})`; }
  }

  function formatLatency(ms) {
    return ms >= 1000 ? (ms / 1000).toFixed(1) + "s" : ms + "ms";
  }

  /* ── 서버 상태 ── */
  async function checkHealth() {
    const el = $("status");
    try {
      const res = await fetch("/actuator/health");
      const up = res.ok && (await res.json()).status === "UP";
      el.className = "status " + (up ? "up" : "down");
      $("status-text").textContent = up ? "정상 동작 중" : "상태 이상";
    } catch {
      el.className = "status down";
      $("status-text").textContent = "연결 끊김";
    }
  }

  /* ── 문서 목록 ── */
  async function loadDocuments() {
    const res = await fetch("/api/documents");
    const docs = await res.json();
    $("doc-count").textContent = docs.length ? docs.length + "개" : "";
    docListEl.innerHTML = "";
    if (docs.length === 0) {
      docListEl.innerHTML = '<li class="doc-empty">아직 문서가 없습니다. 첫 문서를 올려보세요.</li>';
      return;
    }
    for (const doc of docs) {
      const li = document.createElement("li");
      li.className = "doc-item";
      li.innerHTML = DOC_ICON;
      const name = document.createElement("span");
      name.className = "name";
      name.textContent = doc.title;
      name.title = doc.title;
      const chunks = document.createElement("span");
      chunks.className = "chunks";
      chunks.textContent = "청크 " + doc.chunkCount;
      const del = document.createElement("button");
      del.className = "del";
      del.title = "삭제";
      del.innerHTML = TRASH_ICON;
      del.onclick = async () => {
        if (!confirm(`"${doc.title}" 문서를 삭제할까요?`)) return;
        const r = await fetch(`/api/documents/${doc.id}`, { method: "DELETE" });
        if (r.ok) { toast("문서를 삭제했습니다."); loadDocuments(); }
        else toast(await readError(r), true);
      };
      li.append(name, chunks, del);
      docListEl.appendChild(li);
    }
  }

  /* ── 파일 업로드 (클릭 + 드래그앤드롭) ── */
  const dropzone = $("dropzone");
  const fileInput = $("file-input");
  dropzone.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", () => { if (fileInput.files[0]) uploadFile(fileInput.files[0]); });
  ["dragover", "dragenter"].forEach((t) =>
    dropzone.addEventListener(t, (e) => { e.preventDefault(); dropzone.classList.add("drag"); }));
  ["dragleave", "drop"].forEach((t) =>
    dropzone.addEventListener(t, (e) => { e.preventDefault(); dropzone.classList.remove("drag"); }));
  dropzone.addEventListener("drop", (e) => {
    const file = e.dataTransfer.files[0];
    if (file) uploadFile(file);
  });
  window.addEventListener("dragover", (e) => e.preventDefault());
  window.addEventListener("drop", (e) => e.preventDefault());

  async function uploadFile(file) {
    const body = new FormData();
    body.append("file", file);
    dropzone.classList.add("busy");
    $("drop-title").textContent = "업로드 중 — 임베딩 생성…";
    try {
      const res = await fetch("/api/documents/upload", { method: "POST", body });
      if (!res.ok) { toast(await readError(res), true); return; }
      const created = await res.json();
      toast(`"${created.title}" 등록 완료 (청크 ${created.chunkCount}개)`);
      loadDocuments();
    } catch {
      toast("업로드 중 서버에 연결하지 못했습니다.", true);
    } finally {
      dropzone.classList.remove("busy");
      $("drop-title").textContent = "파일을 끌어다 놓거나 클릭";
      fileInput.value = "";
    }
  }

  /* ── 텍스트 등록 ── */
  $("paste-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const res = await fetch("/api/documents", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title: $("paste-title").value, content: $("paste-content").value }),
    });
    if (!res.ok) { toast(await readError(res), true); return; }
    const created = await res.json();
    toast(`"${created.title}" 등록 완료 (청크 ${created.chunkCount}개)`);
    e.target.reset();
    loadDocuments();
  });

  /* ── 질문/답변 ── */
  function addQuestion(text) {
    $("empty-state")?.remove();
    const msg = document.createElement("div");
    msg.className = "msg q";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    msg.appendChild(bubble);
    innerEl.appendChild(msg);
    threadEl.scrollTop = threadEl.scrollHeight;
  }

  function addAnswerShell() {
    const msg = document.createElement("div");
    msg.className = "msg a";
    msg.innerHTML = `<span class="avatar">${AVATAR}</span>`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<span class="typing"><i></i><i></i><i></i></span>';
    msg.appendChild(bubble);
    innerEl.appendChild(msg);
    threadEl.scrollTop = threadEl.scrollHeight;
    return { msg, bubble };
  }

  $("ask-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const question = $("question").value.trim();
    if (!question) return;
    addQuestion(question);
    $("question").value = "";
    $("ask-btn").disabled = true;
    const { msg, bubble } = addAnswerShell();

    try {
      const res = await fetch("/api/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });
      const data = await res.json();
      bubble.textContent = data.answer ?? data.message ?? `요청 실패 (${res.status})`;
      if (!res.ok) { msg.classList.add("error"); return; }

      if (data.sources?.length) {
        const sources = document.createElement("div");
        sources.className = "sources";
        sources.innerHTML = '<div class="label">출처</div>';
        const chips = document.createElement("div");
        chips.className = "chips";
        for (const src of data.sources) {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.innerHTML = DOC_ICON;
          chip.append(` ${src.title} · ${src.chunkSeq}번 청크`);
          chip.title = `유사도 ${src.score.toFixed(3)}`;
          chips.appendChild(chip);
        }
        sources.appendChild(chips);
        bubble.appendChild(sources);
      }
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = `<span>${formatLatency(data.latencyMs)}</span>` +
        (data.cached ? '<span class="cached">캐시 응답</span>' : "");
      bubble.appendChild(meta);
    } catch {
      msg.classList.add("error");
      bubble.textContent = "서버에 연결하지 못했습니다.";
    } finally {
      $("ask-btn").disabled = false;
      $("question").focus();
      threadEl.scrollTop = threadEl.scrollHeight;
    }
  });

  checkHealth();
  setInterval(checkHealth, 30000);
  loadDocuments();
  $("question").focus();
</script>
</body>
</html>
