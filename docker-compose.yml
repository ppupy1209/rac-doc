services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ragdoc
      DB_USERNAME: ragdoc
      DB_PASSWORD: ragdoc
      OLLAMA_BASE_URL: http://ollama:11434
      SPRING_THREADS_VIRTUAL_ENABLED: ${VTHREADS:-false}
      DOWNSTREAM_URL: http://httpbin:8080
      REDIS_HOST: redis
      ES_URL: http://elasticsearch:9200
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
      httpbin:
        condition: service_started
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ragdoc
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ragdoc
      MYSQL_PASSWORD: ragdoc
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

  # study ① 측정용 다운스트림 목 서비스 (/delay/{초} 로 지연 응답). 내부 네트워크 전용.
  httpbin:
    image: mccutchen/go-httpbin:v2.15.0

  # study ④ 분산 캐시 (질의 응답 캐싱).
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  prometheus:
    image: prom/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  mysql-data:
  es-data:
  ollama-models:
  redis-data:
