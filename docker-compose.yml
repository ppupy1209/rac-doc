services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ragdoc
      DB_USERNAME: ragdoc
      DB_PASSWORD: ragdoc
      OLLAMA_BASE_URL: http://ollama:11434
      SPRING_THREADS_VIRTUAL_ENABLED: ${VTHREADS:-false}
      DOWNSTREAM_URL: http://httpbin:8080
      REDIS_HOST: redis
      ES_URL: http://elasticsearch:9200
      # --- 품질 스위치 (.env로 오버라이드). 값은 application.yml의 기본과 동일하게 맞춰 둔다. ---
      # 챗 LLM 프로바이더 (C2). ollama = 키 불필요하지만 환각 75% 실측(llama3.2:3b).
      # gemini = 무료 키 하나로 환각 0%·지연 0.6s 실측 → .env에 GOOGLE_GENAI_API_KEY 넣고 이 값을 gemini로.
      # 임베딩은 어느 쪽이든 Ollama nomic-embed-text 고정(실험 통제 — design-notes §4).
      ASKWIKI_LLM_PROVIDER: ${ASKWIKI_LLM_PROVIDER:-ollama}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY:-}
      # 벡터 인덱스 (C1). memory = 인메모리 브루트포스, elasticsearch = ES kNN(아래 컨테이너가 이미 뜬다).
      VECTOR_INDEX_IMPL: ${VECTOR_INDEX_IMPL:-memory}
      # 질문 분류·라우팅 (C3-2). 약한 모델에선 전부 WIKI로 찍는 축퇴 분류기가 되므로(41.7% 실측)
      # 기본 off. gemini일 때만 켤 것(97.2% 실측).
      ASKWIKI_ROUTING_ENABLED: ${ASKWIKI_ROUTING_ENABLED:-false}
      # 하이브리드 검색 (B5). BM25(어휘)+kNN(의미)을 자체 RRF로 융합. **VECTOR_INDEX_IMPL=elasticsearch일 때만 동작**.
      # 실측: hit rate@1 36.7% → 90.0%, @4 90.0% → 100%(30문항). 켜면 기동 시 1회 재색인(본문 색인)이 돈다.
      ASKWIKI_SEARCH_HYBRID: ${ASKWIKI_SEARCH_HYBRID:-false}
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
      httpbin:
        condition: service_started
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ragdoc
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ragdoc
      MYSQL_PASSWORD: ragdoc
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

  # study ① 측정용 다운스트림 목 서비스 (/delay/{초} 로 지연 응답). 내부 네트워크 전용.
  httpbin:
    image: mccutchen/go-httpbin:v2.15.0

  # study ④ 분산 캐시 (질의 응답 캐싱).
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  prometheus:
    image: prom/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  mysql-data:
  es-data:
  ollama-models:
  redis-data:
